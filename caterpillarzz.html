<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>caterpillarzz</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: rgb(4, 51, 255);
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  canvas {
    width: min(100vmin, 1024px);
    height: min(100vmin, 1024px);
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
// 128x128 cell grid, Bayer 8x8 ordered dither of a shaded caterpillar (8px cells).
// Each string is one row: 128 bits as 32 hex chars, MSB = leftmost cell.
const ROWS = [
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000003800","00000000000000000000000000005000","00000000000000000000000000007800","00000000000000000000000000005000",
"0000000000000000000000000000f800","00000000000000000000000000014000","0000000000000000000000000003c000","00000000000000000000000000050000",
"000000000000000000000000000780e0","000000000000000000000000000501c0","000000000000000000000000000e01e0","00000000000000000000000000040140",
"000000000000000000000000001e07e0","000000000000000000000000001c1d00","0000000000000ff800000000003c3e00","00000000005515505500000000105400",
"0000000000ffeffaff8000000038f800","0000000005d555d5d54000000051d000","000000008affaffaffa880000ffbe000","00000005555555555505500015554000",
"0000002ffeffeffeffaffa003fff8000","0000005d5d5d555d5d5d54005d5d0000","000000affaffaffaffaffa80fffe0000","00000155555555555555500055540000",
"0000ffeffaffaffaffeffafffffa8000","0001d5d5d555555555d5d5d5d5d40000","0007ffaffafbabbafbaffafffffa8000","00055555515515515555555555500000",
"001fffafeaeeaeaaefaffeffffea8000","001d5d555455055455555d5d55400000","003fffafaaaaaaaaabafbaffaaaa0000","00155515501000001115555551000000",
"003fffaee8aa8aa8aaaefaffefaa0000","0015d545404004104145555555000000","003ffbaaa0ebaeb8ebaabafbafa80000","00155501004114104101115505000000",
"003fee8aa8eb8e38eb8abaeeaf000000","00155500014154154140145545000000","002baa8e38e38e38e38e3aaaaf000000","00155004114154154104105005000000",
"000aaa8eb8c1dc1dc18eb8aaaf000000","000440141541c001c154144005000000","0002aa2e3c808000809e38aaa0000000","00004114140000000014104100000000",
"0000eb8c1c000000001c18eb80000000","000141541c000000001c154140000000","0001e3c000000000000001e3c0000000","00014140000000000000014140000000",
"0001e3c000000000000001e3c0000000","0001c1c000000000000001c1c0000000","0001c1c000000000000001c1c0000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000"
];

const CELL = 8;
const ctx = document.getElementById("c").getContext("2d");
ctx.fillStyle = "rgb(4,51,255)";
ctx.fillRect(0, 0, 1024, 1024);
ctx.fillStyle = "#ffffff";
ROWS.forEach((hex, gy) => {
  const bits = BigInt("0x" + hex);
  for (let gx = 0; gx < 128; gx++) {
    if ((bits >> BigInt(127 - gx)) & 1n) ctx.fillRect(gx * CELL, gy * CELL, CELL, CELL);
  }
});
</script>
</body>
</html>
