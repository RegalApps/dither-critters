<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wingzz</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: rgb(4, 51, 255);
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  canvas {
    width: min(100vmin, 1024px);
    height: min(100vmin, 1024px);
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
// 128x128 cell grid extracted 1:1 from the source dither (8px cells).
// Each string is one row: 128 bits as 32 hex chars, MSB = leftmost cell.
const ROWS = [
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000010000",
"000000000000000000000000000e8000","00000000000000000000000000444000","00000000000000000000000000aba000","00000000000000000000000005510000",
"0000200000000000000000000eaae000","0000d400000000000000000015544000","0000fb800000000000000000baaaa000","00005540000000000000000155450000",
"0000ffe00000000000000007aeaa8000","00005554000000000000001554510000","0000bbba000000000000003aaaa20000","00005555000000000000005545400000",
"00006eafe0000000000000eeaeaa8000","00005555500000000000005515140000","00003aafb8000000000003babaaa0000","00001545540000000000051051400000",
"00002feaee00000000000feaeaaa0000","00001551550000000000154541440000","00000aaabb80000000002aaaaaa00000","00000515154000000000551515000000",
"00000aabaee000000000aebaeaa80000","00000145555000000001545040000000","000002a3abb800000002abaaaaa00000","00000051515000000005515151000000",
"000000aebaec0000000eaeaeaa800000","00000044505400000015551500000000","0000002abbaa0000003bba2a2a000000","00000015155500000055541010000000",
"00000e2aeaea800000eee8aaa8000000","00001505555500000155515001000000","00003baaabba800003aba3a22a800000","00001151515540000555150011000000",
"00000eeafaeea0000eeeaa8aaaa00000","00000554554540001554405554400000","00000aaa2aaaa0002bba2aaaaaa00000","00000151151550001511510551000000",
"000002ee8aaaa8002eeaaaaeaa800000","00000555455540005544005545000000","000002baa2aba800aaaaaaaaaa000000","00000155514450015115055410000000",
"000000aeeeaea802eaaa8eeaa8000000","00000055551554015050154044000000","0000002baaaaa802aaa22aaba8000000","00000005455550045150511500000000",
"0000000aaaefa80aaeeaeaea80000000","00000001544514150545404000000000","00000000babaa83aba2aabaa00000000","00000000151154151010510000000000",
"000000002aaaac2ea8aaea8000000000","00000000045454454144400000000000","000000002bbaa82aa2abb80000000000","00000000554554110051540000000000",
"00000002aefea8aa8eefee0000000000","00000004555511541555550000000000","0000001baabb80aaabbaba8000000000","00000015155540515555550000000000",
"0000006eeeee802eeeaeae8000000000","00000055555440555555550000000000","000001abaa3a81bbababaa8000000000","00000114155501555555550000000000",
"000002eaebee82fefebaee0000000000","00000155554545555555540000000000","000002aaaaba82bbabaaba0000000000","00000555151105555555500000000000",
"00000eaaeeea0eaeaeaeea0000000000","00000554445405555555440000000000","00000aababaa0babaabaa80000000000","00000111114005555155100000000000",
"00000aeaaea802aafeeae00000000000","00000555550005555555400000000000","00000aaabaa002aaaaaaa00000000000","00000544500001551155000000000000",
"00000aaaea8000eaaeaa800000000000","00000515540000555555000000000000","000002aaaa00002aaaaa000000000000","00000150000000155550000000000000",
"000000aaa000000eaaea000000000000","00000054000000055540000000000000","0000002200000002aaa8000000000000","00000000000000001000000000000000",
"0000000000000000aa80000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000",
"00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000","00000000000000000000000000000000"
];

const CELL = 8;
const BG = "rgb(4,51,255)";
const WHITE = "#ffffff";

// Decode hex rows into a flat list of white-cell coordinates.
const cells = [];
ROWS.forEach((hex, gy) => {
  const bits = BigInt("0x" + hex);
  for (let gx = 0; gx < 128; gx++) {
    if ((bits >> BigInt(127 - gx)) & 1n) cells.push([gx, gy]);
  }
});

const ctx = document.getElementById("c").getContext("2d");
ctx.fillStyle = BG;
ctx.fillRect(0, 0, 1024, 1024);
ctx.fillStyle = WHITE;
for (const [gx, gy] of cells) ctx.fillRect(gx * CELL, gy * CELL, CELL, CELL);

// Sparks: a random white square lights up R -> G -> B, then settles back to white.
const sparks = new Map(); // cell index -> birth timestamp
const SPARK_LIFE = 900;   // ms per spark
const SPARK_RATE = 14;    // average new sparks per second

function sparkColor(age) {
  const t = age / SPARK_LIFE;
  if (t < 0.25) return "#ff2020";
  if (t < 0.5)  return "#20ff40";
  if (t < 0.75) return "#2040ff";
  return WHITE; // eased back to white for the last quarter
}

let last = performance.now();
function frame(now) {
  const dt = now - last;
  last = now;

  if (Math.random() < (dt / 1000) * SPARK_RATE) {
    const i = (Math.random() * cells.length) | 0;
    if (!sparks.has(i)) sparks.set(i, now);
  }

  for (const [i, born] of sparks) {
    const age = now - born;
    const [gx, gy] = cells[i];
    if (age >= SPARK_LIFE) {
      sparks.delete(i);
      ctx.fillStyle = WHITE;
    } else {
      ctx.fillStyle = sparkColor(age);
    }
    ctx.fillRect(gx * CELL, gy * CELL, CELL, CELL);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
